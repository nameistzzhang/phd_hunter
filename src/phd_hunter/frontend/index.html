<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhD Hunter - Professor Dashboard</title>
    <link rel="stylesheet" href="static/styles.css">
</head>
<body>
    <div class="layout">
        <!-- Top Navigation Bar -->
        <nav class="top-nav">
            <div class="nav-container">
                <!-- Left side: Brand + Logo + Nav links -->
                <div class="nav-left">
                    <img src="static/windsurf.svg" alt="Logo" class="nav-logo">
                    <span class="brand-text">PhD Hunter</span>
                    <span class="nav-divider"></span>
                    <a href="#" class="nav-link active">Profile</a>
                    <span class="nav-separator">›</span>
                    <a href="#" class="nav-link">Hunt</a>
                    <span class="nav-separator">›</span>
                    <a href="#" class="nav-link">Chat</a>
                </div>

                <!-- Right side: Settings -->
                <a href="#" class="nav-link settings-link">
                    <img src="static/setting_icon.svg" alt="Settings" class="settings-icon">
                </a>
            </div>
        </nav>

    <!-- Main Body: Chat + Info -->
    <div class="main-body">
        <!-- Left: Chat Panel (60%) -->
        <section class="chat-panel">
            <div class="chat-header">
                <h1>Professor Finder</h1>
                <p class="subtitle">Search and analyze CS professors</p>
            </div>

            <div class="chat-messages" id="chat-messages">
                <div class="message assistant">
                    <div class="message-content">
                        <p>Hello. I'm the PhD Hunter assistant.</p>
                        <p>I can help you:</p>
                        <ul>
                            <li>Analyze professor research areas</li>
                            <li>Assess application fit</li>
                            <li>Provide application strategy</li>
                        </ul>
                        <p>Click any professor on the right to start.</p>
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Type a question..." autocomplete="off">
                    <button id="send-btn" type="button">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </section>

        <!-- Right: Professor List (40%) -->
        <section class="info-panel">
            <div class="info-header">
                <div class="header-row">
                    <h2 class="header-title">Professors</h2>
                    <div class="stats" id="stats">
                        <!-- Stats injected by JS -->
                    </div>
                </div>
            </div>

            <!-- Filter bar -->
            <div class="filter-bar">
                <div class="filter-group">
                    <label for="filter-priority">Priority</label>
                    <select id="filter-priority" class="filter-select">
                        <option value="all">All Priorities</option>
                        <option value="0">Reach</option>
                        <option value="1">Good Match</option>
                        <option value="2">Safe</option>
                        <option value="3">Backup</option>
                        <option value="-1">Not Considered</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filter-area">Research Area</label>
                    <select id="filter-area" class="filter-select">
                        <option value="all">All Areas</option>
                        <!-- Areas populated by JS -->
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filter-university">University</label>
                    <select id="filter-university" class="filter-select">
                        <option value="all">All Universities</option>
                        <!-- Universities populated by JS -->
                    </select>
                </div>
            </div>

            <div class="professor-list" id="professor-list">
                <!-- Professor cards -->
            </div>
        </section>
    </div> <!-- end main-body -->
</div> <!-- end layout -->

    <!-- Professor Detail Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <script src="static/app.js"></script>
</body>
</html>
